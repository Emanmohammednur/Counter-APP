<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Website</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Add inside <head> -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">
    <div class="container text-center">
                <div class="card p-4 shadow-lg bg-transparent border-0">

            <h1 class="display-5 fw-bold text-success mb-3">
                Counter App
            </h1>

            <div class="d-flex justify-content-between align-items-center mb-2">
               
                <i id="soundToggle" class="bi bi-volume-up text-white" style="cursor:pointer;"></i>
            </div>

            <!-- Counter -->
            <label id="countLabel" class="display-1 text-white">0</label>

            <!-- Buttons -->
            <div class="d-flex justify-content-center gap-3 mt-3 flex-wrap">
                <button id="decreaseBtn" class="btn btn-danger btn-lg">-</button>
                <button id="resetBtn" class="btn btn-secondary btn-lg">Reset</button>
                <button id="increaseBtn" class="btn btn-success btn-lg">+</button>
            </div>
        </div>
    </div>
       <!-- Audio -->
    <audio id="clickSound" src="sounds/click.wav"></audio>
    <audio id="resetSound" src="sounds/reset.wav"></audio>
    <script src="script.js"></script>
</body>
</html>
